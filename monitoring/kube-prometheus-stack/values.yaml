prometheus:
  prometheusSpec:
    retention: 12h
    scrapeInterval: 30s
    evaluationInterval: 30s

    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

    serviceMonitorNamespaceSelector: {}
    podMonitorNamespaceSelector: {}
    ruleNamespaceSelector: {}

    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi

alertmanager:
  config:
    global:
      resolve_timeout: 5m

    route:
      receiver: default-receiver
      group_by:
        - alertname
        - service
        - endpoint
        - slo
        - severity
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 2h
      routes:
        - receiver: page-receiver
          matchers:
            - severity="page"
          continue: false

        - receiver: ticket-receiver
          matchers:
            - severity="ticket"
          continue: false

        - receiver: null-receiver
          matchers:
            - alertname="Watchdog"
          continue: false

    inhibit_rules:
      - source_matchers:
          - severity="page"
        target_matchers:
          - severity="ticket"
        equal:
          - service
          - endpoint
          - slo

    receivers:
      - name: default-receiver
      - name: page-receiver
      - name: ticket-receiver
      - name: null-receiver

  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

grafana:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 768Mi

prometheusOperator:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

kube-state-metrics:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

prometheus-node-exporter:
  resources:
    requests:
      cpu: 20m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi
