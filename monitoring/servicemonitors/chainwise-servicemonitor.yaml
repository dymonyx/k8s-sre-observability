apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: chainwise-services
  namespace: chainwise
  labels:
    app.kubernetes.io/name: chainwise-services
    app.kubernetes.io/part-of: chainwise
spec:
  selector:
    matchLabels:
      monitoring.chainwise.io/scrape: "true"
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 5s
