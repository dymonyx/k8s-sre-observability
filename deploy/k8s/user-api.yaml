apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-api
  namespace: chainwise
  labels:
    app.kubernetes.io/name: user-api
    app.kubernetes.io/part-of: chainwise
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: user-api
      app.kubernetes.io/part-of: chainwise
  template:
    metadata:
      labels:
        app.kubernetes.io/name: user-api
        app.kubernetes.io/part-of: chainwise
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: user-api
          image: chainwise/user-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8085
          env:
            - name: PORT
              value: "8085"
---
apiVersion: v1
kind: Service
metadata:
  name: user-api
  namespace: chainwise
  labels:
    app.kubernetes.io/name: user-api
    app.kubernetes.io/part-of: chainwise
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: user-api
    app.kubernetes.io/part-of: chainwise
  ports:
    - name: http
      port: 8085
      targetPort: http
