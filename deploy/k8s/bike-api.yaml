apiVersion: apps/v1
kind: Deployment
metadata:
  name: bike-api
  namespace: chainwise
  labels:
    app.kubernetes.io/name: bike-api
    app.kubernetes.io/part-of: chainwise
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bike-api
      app.kubernetes.io/part-of: chainwise
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bike-api
        app.kubernetes.io/part-of: chainwise
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: bike-api
          image: chainwise/bike-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081
          env:
            - name: PORT
              value: "8081"
            - name: MAINTENANCE_API_URL
              value: "http://maintenance-api:8082"
---
apiVersion: v1
kind: Service
metadata:
  name: bike-api
  namespace: chainwise
  labels:
    app.kubernetes.io/name: bike-api
    app.kubernetes.io/part-of: chainwise
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: bike-api
    app.kubernetes.io/part-of: chainwise
  ports:
    - name: http
      port: 8081
      targetPort: http
