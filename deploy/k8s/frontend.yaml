apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: chainwise
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: chainwise
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
      app.kubernetes.io/part-of: chainwise
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
        app.kubernetes.io/part-of: chainwise
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: chainwise/frontend:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: BIKE_API_URL
              value: "http://bike-api:8081"

          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3

          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: chainwise
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: chainwise
    app.kubernetes.io/component: frontend
    monitoring.chainwise.io/scrape: "true"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: chainwise
  ports:
    - name: http
      port: 8080
      targetPort: http
