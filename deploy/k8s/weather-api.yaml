apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-api
  namespace: chainwise
  labels:
    app.kubernetes.io/name: weather-api
    app.kubernetes.io/part-of: chainwise
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: weather-api
      app.kubernetes.io/part-of: chainwise
  template:
    metadata:
      labels:
        app.kubernetes.io/name: weather-api
        app.kubernetes.io/part-of: chainwise
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: weather-api
          image: chainwise/weather-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8083
          env:
            - name: PORT
              value: "8083"
            - name: REMINDER_API_URL
              value: "http://reminder-api:8084"
            - name: HTTP_TIMEOUT
              value: "3s"
            - name: WEATHER_CITY
              value: "Saint Petersburg"
            - name: WEATHER_LATITUDE
              value: "59.9311"
            - name: WEATHER_LONGITUDE
              value: "30.3609"
            - name: DEMO_WEATHER
              value: "rainy"

          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3

          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: weather-api
  namespace: chainwise
  labels:
    app.kubernetes.io/name: weather-api
    app.kubernetes.io/part-of: chainwise
    app.kubernetes.io/component: backend
    monitoring.chainwise.io/scrape: "true"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: weather-api
    app.kubernetes.io/part-of: chainwise
  ports:
    - name: http
      port: 8083
      targetPort: http
