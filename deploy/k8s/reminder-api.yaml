apiVersion: apps/v1
kind: Deployment
metadata:
  name: reminder-api
  namespace: chainwise
  labels:
    app.kubernetes.io/name: reminder-api
    app.kubernetes.io/part-of: chainwise
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: reminder-api
      app.kubernetes.io/part-of: chainwise
  template:
    metadata:
      labels:
        app.kubernetes.io/name: reminder-api
        app.kubernetes.io/part-of: chainwise
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: reminder-api
          image: chainwise/reminder-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8084
          env:
            - name: PORT
              value: "8084"
            - name: USER_API_URL
              value: "http://user-api:8085"

          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3

          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: reminder-api
  namespace: chainwise
  labels:
    app.kubernetes.io/name: reminder-api
    app.kubernetes.io/part-of: chainwise
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: reminder-api
    app.kubernetes.io/part-of: chainwise
  ports:
    - name: http
      port: 8084
      targetPort: http
